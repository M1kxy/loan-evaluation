spring:
  application:
    name: loan-evaluation

  datasource:
    url: jdbc:h2:file:./data/loan-db
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  sql:
    init:
      mode: always
      
  h2:
    console:
      enabled: true
      path: /h2-console